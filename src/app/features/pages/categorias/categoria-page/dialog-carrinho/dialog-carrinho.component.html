<h2 mat-dialog-title class="title">Seu Carrinho</h2>

<div mat-dialog-content class="carrinho-container">

  <div *ngIf="itens.length === 0" class="empty">
    <mat-icon>shopping_cart</mat-icon>
    <p>Seu carrinho está vazio</p>
  </div>

  <div *ngFor="let item of itens" class="item">

    <div class="info">

      <div class="nome">
        {{ item.produto }}
      </div>

      <div class="preco">
        {{ item.preco | currency:'BRL' }}
      </div>

    </div>

    <div class="acoes">

      <span class="qtd">
        x{{ item.quantidade }}
      </span>

      <button mat-icon-button color="warn">
        <mat-icon>delete</mat-icon>
      </button>

    </div>

  </div>

</div>

<div class="footer">

  <div class="total">
    <span>Total</span>
    <span class="valor">
      {{ total | currency:'BRL' }}
    </span>
  </div>

  <button mat-raised-button color="primary" class="btn-enviar">
    Enviar pedido
  </button>

</div>
