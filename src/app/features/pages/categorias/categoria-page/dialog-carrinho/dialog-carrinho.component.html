<h2 mat-dialog-title class="title">Seu Carrinho</h2>

<div mat-dialog-content class="carrinho-container">

  <div *ngIf="produto.length === 0" class="empty">
    <mat-icon>shopping_cart</mat-icon>
    <p>Seu carrinho está vazio</p>
  </div>

  <div *ngFor="let item of produto" class="item">

    <div class="info">

      <div class="nome">
        {{ item.nome }}
      </div>

      <div class="preco">
        {{ item.preco | currency:'BRL' }}
      </div>

    </div>

    <div class="acoes">

      <span class="qtd">
        x{{ item.quantidade }}
      </span>

      


    </div>

  </div>

</div>

<div class="footer">

  <div class="total">
    <span>Total</span>
    <span class="valor">
      {{ total | currency:'BRL' }}
    </span>
  </div>


</div>
