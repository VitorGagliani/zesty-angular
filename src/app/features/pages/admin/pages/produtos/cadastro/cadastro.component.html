<h2 mat-dialog-title class="title">{{data.titulo}}</h2>

<div mat-dialog-content class="dialog-container">


  <div class="info">
    <mat-form-field appearance="outline">
      <mat-label>Produto</mat-label>
      <input matInput [formControl]="nome" required>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Descrição</mat-label>
      <input matInput [formControl]="descricao" required>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Preço</mat-label>
      <input matInput type="number" [formControl]="preco" required>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Categoria</mat-label>

      <mat-select [formControl]="categoriaProduto" required>

        <mat-option value="">Selecione uma categoria</mat-option>

        @for (cat of categoria; track cat.id) {
        <mat-option [value]="cat.id">
          {{ cat.nome }}
        </mat-option>
        }
      </mat-select>

    </mat-form-field>


    <div class="upload">
      <label>Imagem</label>
      <input type="file" (change)="uploadImagem($event)">
    </div>





  </div>

  <div class="acoes">
    <button mat-button (click)="salvar()" [disabled]="uploading || !imagemUrl">

      <ng-container *ngIf="uploading">
        <mat-icon class="spin">autorenew</mat-icon>
        Enviando...
      </ng-container>

      <ng-container *ngIf="!uploading">
        {{ !imagemUrl ? 'Aguardando imagem carregar...' : data.botao }}
      </ng-container>

    </button>
  </div>


</div>

<div class="footer">




</div>
