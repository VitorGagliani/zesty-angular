<div class="container">

  <!-- AÇÕES -->
  <div class="actions">
    <button (click)="abrirDialog()">
      <div class="card">
        <mat-icon color="primary" class="icon-card">add</mat-icon>
        <h3>Nova categoria</h3>
      </div>
    </button>
  </div>

  <!-- GRID -->
  <div class="grid">
    <table class="tabela">
      <thead>
        <tr>
          <th>ID</th>
          <th>Categoria</th>
          <th></th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let categoria of categoria" >
          <td (click)="abrirDialogEditar(categoria)">{{ categoria.id }}</td>
          <td (click)="abrirDialogEditar(categoria)">{{ categoria.nome }}</td>
          <td><button (click)="deletarCategoria(categoria.id)">
            <mat-icon class="mat-18" color="primary">delete</mat-icon>
          </button></td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
