<mat-sidenav-container>
  <mat-sidenav #sidenav [opened]="false" class="navcontent">
    <div class="title">
      <img class="logo" src="assets/Zesty-Logo.svg" alt="">
      <h1>Zesty</h1>
    </div>
    <div class="subcontent">
          @for(item of menuItems; track item.label){

    <button mat-button color="primary" [routerLink]="item.route">

      <mat-icon>{{item.icon}}</mat-icon>
      {{item.label}}

    </button>

  }
    </div>



  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar>
      <button mat-button (click)="sidenav.toggle()" color="primary">
        <mat-icon>menu</mat-icon>
      </button>
      <mat-toolbar class="toolbar">

  <button mat-button color="primary" class="btn-side-nav" (click)="sidenav.toggle()">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="page-title">{{pageTitle}}</span>



</mat-toolbar>
    </mat-toolbar>
    <div class="container">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
