<div class="dialog">
  <div class="titulo">
    <h2 mat-dialog-title>{{data.nome}}</h2>
    <p>
          <strong>
            {{ data.preco | currency:'BRL':'symbol':'1.2-2' }}
          </strong>
        </p>
  </div>

  <mat-dialog-content align="center">
    <div class="container">

      <img [src]="data.imagem" width="240">

      <div class="texto">
        <p>{{data.descricao}}</p>


      </div>
    </div>

    <div class="forms">
      <form [formGroup]="form" class="form">

        <mat-form-field appearance="outline">
          <mat-label>Quantidade</mat-label>
          <input matInput type="number" formControlName="quantidade" min="1">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Observação</mat-label>
          <textarea matInput rows="3" formControlName="observacao"></textarea>
        </mat-form-field>

      </form>
    </div>

  </mat-dialog-content>

  <mat-dialog-actions align="end">

    <button mat-button>
      Cancelar
    </button>

    <button mat-raised-button color="primary">
      Adicionar
    </button>

  </mat-dialog-actions>

</div>
