<mat-sidenav-container>
  <mat-sidenav #sidenav [opened]="false" class="navcontent">
    <div class="title">
      <img class="logo" src="assets/Zesty-Logo.svg" alt="">
      <h1>Categorias</h1>
    </div>
    @for(categoria of categorias; track categoria.id) {
    <div class="subcontent">
      <button mat-button color="primary" (click)="sidenav.toggle()" [routerLink]="['/categoria', categoria.id] ">
        {{ categoria.nome }}
      </button>
    </div>
    }

  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar>
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <mat-toolbar class="toolbar">

  <button mat-icon-button (click)="sidenav.toggle()">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="spacer"></span>

  <button mat-icon-button class="cart-button">
    <mat-icon>shopping_bag</mat-icon>
  </button>

</mat-toolbar>
    </mat-toolbar>
    <div class="content-padding">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
